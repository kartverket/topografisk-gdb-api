services:
  api:
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/geodata
      APP_ENV: development
      PYTHONUNBUFFERED: 1
    volumes:
      - ./app:/app/app:ro
    command: ["/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
