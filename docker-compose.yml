services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: postgis-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geodata
    ports:
      - "5432:5432"
    volumes:
      - ./ar5_nibio_db_init.sql:/docker-entrypoint-initdb.d/01_ar5_db_nibio.sql
      # Persist data across restarts
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: postgis-api
    environment:
      APP_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
